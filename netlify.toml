[build]
  command = "curl -fsSL https://bun.sh/install | bash && ~/.bun/bin/bun install && ~/.bun/bin/bun run build:web"
  publish = "packages/web/dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["packages/api/src/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
